backend:
  name: github
  repo: CELEdigital/celedigital.github.io
  branch: main
  site_domain: celedigital.netlify.app
  base_url: https://api.netlify.com
  auth_endpoint: auth

local_backend: true

media_folder: "static/img"
public_folder: "/img"

# NOTE: Sveltia/Decap native i18n cannot represent this site's Hugo layout
# (content/<locale>/<section>/), so each language uses its own explicit
# collection. ES and EN versions of a piece are linked via `translationKey`.

collections:

  # ─────────────────────────────────────────
  # POSTS (ES)
  # ─────────────────────────────────────────
  - name: "posts_es"
    label: "Posts (ES)"
    label_singular: "Post"
    folder: "content/es/posts"
    create: true
    format: "yaml-frontmatter"
    extension: "md"
    slug: "{{slug}}"

    fields: &posts_fields
      - label: "Título"
        name: "title"
        widget: "string"

      - label: "Slug"
        name: "slug"
        widget: "string"
        hint: "URL del post: solo minúsculas, números y guiones"
        pattern: ['^[a-z0-9-]+$', "Solo minúsculas, números y guiones"]

      - label: "Fecha"
        name: "date"
        widget: "datetime"
        date_format: "YYYY-MM-DD"
        time_format: false

      - label: "Descripción"
        name: "description"
        widget: "string"
        required: false
        hint: "Resumen breve visible en listados y SEO"

      - label: "Autor/es"
        name: "author"
        widget: "list"
        hint: "Identificador del autor (ej: CELE, mmdg, adc). Uno por línea."
        field:
          label: "Autor"
          name: "author"
          widget: "string"

      - label: "Tipo de contenido"
        name: "content_type"
        widget: "select"
        multiple: true
        max: 1
        default: ["blog"]
        options:
          - { label: "Blog / Análisis", value: "blog" }
          - { label: "Mesa legislativa", value: "mesa" }
          - { label: "Boletín", value: "boletin" }
          - { label: "Newsletter DSA", value: "newsletter_dsa" }

      - label: "Programa"
        name: "programs"
        widget: "select"
        multiple: true
        max: 1
        required: false
        default: ["policy"]
        options:
          - { label: "Policy", value: "policy" }
          - { label: "Publicaciones", value: "publicaciones" }

      - label: "Destacado en home"
        name: "featured"
        widget: "boolean"
        default: false

      - label: "Formatos de salida"
        name: "outputs"
        widget: "select"
        multiple: true
        required: false
        default: ["html"]
        hint: "Agregá 'Email / Newsletter' para generar la versión de email (.../email.html)"
        options:
          - { label: "Web (HTML)", value: "html" }
          - { label: "Email / Newsletter", value: "email" }

      - label: "Número de newsletter"
        name: "newsletter_number"
        widget: "string"
        required: false
        hint: "Solo para email/newsletter. Ej: #9 · Enero 2025 (encabezado del email)"

      - label: "Bajada / tagline"
        name: "tagline"
        widget: "string"
        required: false
        hint: "Solo para email/newsletter. Subtítulo del encabezado (si está vacío, usa la descripción)"

      - label: "Imagen"
        name: "image"
        widget: "image"
        required: false
        choose_url: true
        hint: "Imagen de portada (se guarda en /img)"

      - label: "Issues / Temas"
        name: "issues"
        widget: "select"
        multiple: true
        required: false
        options:
          - "Erosión democrática"
          - "Plataformas"
          - "Regulación y tecnología"
          - "Violencias"

      - label: "Región"
        name: "region"
        widget: "select"
        required: false
        options:
          - { label: "América Latina", value: "latam" }
          - { label: "Estados Unidos", value: "us" }
          - { label: "Europa", value: "europa" }
          - { label: "Global", value: "global" }

      - label: "Países"
        name: "country"
        widget: "list"
        required: false
        hint: "Códigos ISO de dos letras (ej: AR, BR, US, CO)"
        field:
          label: "País"
          name: "country"
          widget: "string"

      - label: "Placements (ubicaciones en hubs)"
        name: "placements"
        widget: "list"
        required: false
        hint: "Define en qué hub y en qué bloque aparece este post"
        fields:
          - label: "Hub"
            name: "hub"
            widget: "select"
            options:
              - { label: "Erosión democrática", value: "temas/erosion-democratica" }
              - { label: "Plataformas", value: "temas/plataformas" }
              - { label: "Regulación y tecnología", value: "temas/regulacion-y-tecnologia" }
              - { label: "Violencias", value: "temas/violencias" }
              - { label: "Región: América Latina", value: "region/america-latina" }
              - { label: "Región: Europa", value: "region/europa" }
              - { label: "Región: Global", value: "region/global" }
          - label: "Bloque"
            name: "block"
            widget: "select"
            default: "ultimas_noticias_analisis"
            options:
              - { label: "Destacado", value: "destacado" }
              - { label: "Últimas noticias y análisis", value: "ultimas_noticias_analisis" }
              - { label: "Publicaciones", value: "publicaciones" }

      - label: "Tags"
        name: "tags"
        widget: "list"
        required: false
        field:
          label: "Tag"
          name: "tag"
          widget: "string"

      - label: "Translation Key"
        name: "translationKey"
        widget: "string"
        required: false
        hint: "Mismo valor en la versión ES y EN para vincularlas (toggle de idioma)"

      - label: "URL fuente"
        name: "source_url"
        widget: "string"
        required: false
        hint: "Solo para mesas: URL de la página original del evento"

      - label: "Tipo Hugo"
        name: "type"
        widget: "hidden"
        default: "posts"

      - label: "Cuerpo"
        name: "body"
        widget: "markdown"

  # ─────────────────────────────────────────
  # POSTS (EN)
  # ─────────────────────────────────────────
  - name: "posts_en"
    label: "Posts (EN)"
    label_singular: "Post"
    folder: "content/en/posts"
    create: true
    format: "yaml-frontmatter"
    extension: "md"
    slug: "{{slug}}"
    fields: *posts_fields


  # ─────────────────────────────────────────
  # NOTICIAS CRUZANDO EL MAR (ES)
  # ─────────────────────────────────────────
  - name: "noticias_cruzando_es"
    label: "Noticias cruzando el mar (ES)"
    label_singular: "Entrega"
    folder: "content/es/noticias-cruzando-el-mar"
    create: true
    format: "yaml-frontmatter"
    extension: "md"
    slug: "{{slug}}"
    fields: *posts_fields

  # ─────────────────────────────────────────
  # NOTICIAS CRUZANDO EL MAR (EN)
  # ─────────────────────────────────────────
  - name: "noticias_cruzando_en"
    label: "Noticias cruzando el mar (EN)"
    label_singular: "Issue"
    folder: "content/en/noticias-cruzando-el-mar"
    create: true
    format: "yaml-frontmatter"
    extension: "md"
    slug: "{{slug}}"
    fields: *posts_fields


  # ─────────────────────────────────────────
  # PUBLICACIONES / PAPERS (ES)
  # ─────────────────────────────────────────
  - name: "publicaciones_es"
    label: "Publicaciones / Papers (ES)"
    label_singular: "Publicación"
    folder: "content/es/publicaciones"
    create: true
    format: "yaml-frontmatter"
    extension: "md"
    slug: "{{slug}}"

    fields: &publicaciones_fields
      - label: "Título"
        name: "title"
        widget: "string"

      - label: "Fecha"
        name: "date"
        widget: "datetime"
        date_format: "YYYY-MM-DD"
        time_format: false

      - label: "Autor/es"
        name: "author"
        widget: "list"
        field:
          label: "Autor"
          name: "author"
          widget: "string"

      - label: "Tipo de contenido"
        name: "content_type"
        widget: "select"
        multiple: true
        max: 1
        default: ["research"]
        options:
          - { label: "Documento de posición", value: "position-paper" }
          - { label: "Artículo de investigación", value: "research" }
          - { label: "Informe de jurisprudencia", value: "jurisprudencia" }
          - { label: "Informe legislativo", value: "informe-legislativo" }
          - { label: "Compilación", value: "compilation" }

      - label: "Programa"
        name: "programs"
        widget: "hidden"
        default: ["publicaciones"]

      - label: "SSRN ID"
        name: "ssrn_id"
        widget: "string"
        required: false
        hint: "Número de abstract en SSRN (ej: 5125874)"

      - label: "SSRN URL"
        name: "ssrn_url"
        widget: "string"
        required: false

      - label: "Referencia"
        name: "reference"
        widget: "string"
        required: false
        hint: "Ej: CELE Research Paper No. 11"

      - label: "Abstract"
        name: "abstract"
        widget: "text"
        required: false

      - label: "Bibliografía (CSL-JSON)"
        name: "references"
        widget: "file"
        required: false
        media_folder: "/static/references"
        public_folder: "/references"
        hint: "Archivo JSON (CSL-JSON) con la bibliografía. Se guarda en /static/references/"

      - label: "Estilo de cita (CSL)"
        name: "csl"
        widget: "select"
        required: false
        hint: "Estilo de citación para la bibliografía"
        options:
          - { label: "APA 7", value: "/csl/apa7.csl" }
          - { label: "Bluebook (Law Review)", value: "/csl/bluebook-law-review_2.csl" }
          - { label: "Chicago (autor-fecha)", value: "/csl/chicago-author-date_mobilization.csl" }
          - { label: "Guía argentina de citas legales", value: "/csl/guia-argentina-de-citas-legales.csl" }
          - { label: "OSCOLA", value: "/csl/oscola.csl" }

      - label: "Issues / Temas"
        name: "issues"
        widget: "select"
        multiple: true
        required: false
        options:
          - "Erosión democrática"
          - "Plataformas"
          - "Regulación y tecnología"
          - "Violencias"

      - label: "Región"
        name: "region"
        widget: "select"
        required: false
        options:
          - { label: "América Latina", value: "latam" }
          - { label: "Estados Unidos", value: "us" }
          - { label: "Europa", value: "europa" }
          - { label: "Global", value: "global" }

      - label: "Países"
        name: "country"
        widget: "list"
        required: false
        hint: "Códigos ISO de dos letras"
        field:
          label: "País"
          name: "country"
          widget: "string"

      - label: "Placements (ubicaciones en hubs)"
        name: "placements"
        widget: "list"
        required: false
        hint: "Define en qué hub y en qué bloque aparece esta publicación"
        fields:
          - label: "Hub"
            name: "hub"
            widget: "select"
            options:
              - { label: "Erosión democrática", value: "temas/erosion-democratica" }
              - { label: "Plataformas", value: "temas/plataformas" }
              - { label: "Regulación y tecnología", value: "temas/regulacion-y-tecnologia" }
              - { label: "Violencias", value: "temas/violencias" }
              - { label: "Región: América Latina", value: "region/america-latina" }
              - { label: "Región: Europa", value: "region/europa" }
              - { label: "Región: Global", value: "region/global" }
          - label: "Bloque"
            name: "block"
            widget: "select"
            options:
              - { label: "Destacado", value: "destacado" }
              - { label: "Últimas noticias y análisis", value: "ultimas_noticias_analisis" }
              - { label: "Publicaciones", value: "publicaciones" }

      - label: "Tags"
        name: "tags"
        widget: "list"
        required: false
        field:
          label: "Tag"
          name: "tag"
          widget: "string"

      - label: "Translation Key"
        name: "translationKey"
        widget: "string"
        required: false
        hint: "Mismo valor en la versión ES y EN para vincularlas"

      - label: "Cuerpo (opcional)"
        name: "body"
        widget: "markdown"
        required: false

  # ─────────────────────────────────────────
  # PUBLICACIONES / PAPERS (EN) — content/en/publicaciones (URL /en/research/)
  # ─────────────────────────────────────────
  - name: "publicaciones_en"
    label: "Publicaciones / Papers (EN)"
    label_singular: "Publicación"
    folder: "content/en/publicaciones"
    create: true
    format: "yaml-frontmatter"
    extension: "md"
    slug: "{{slug}}"
    fields: *publicaciones_fields


  # ─────────────────────────────────────────
  # BOLETINES — OBSERVATORIO LEGISLATIVO (ES)
  # ─────────────────────────────────────────
  - name: "boletines_es"
    label: "Boletines — Observatorio Legislativo (ES)"
    label_singular: "Boletín"
    folder: "content/es/observatorio-legislativo"
    create: true
    format: "yaml-frontmatter"
    extension: "md"
    slug: "{{slug}}"

    fields: &boletines_fields
      - label: "Título"
        name: "title"
        widget: "string"
        hint: "Ej: Boletín mensual Observatorio Legislativo | Junio 2024"

      - label: "Slug"
        name: "slug"
        widget: "string"
        hint: "URL del boletín: solo minúsculas, números y guiones"
        pattern: ['^[a-z0-9-]+$', "Solo minúsculas, números y guiones"]

      - label: "Fecha"
        name: "date"
        widget: "datetime"
        date_format: "YYYY-MM-DD"
        time_format: false

      - label: "Descripción"
        name: "description"
        widget: "string"
        required: false

      - label: "Autor/es"
        name: "author"
        widget: "list"
        field:
          label: "Autor"
          name: "author"
          widget: "string"

      - label: "Tipo de contenido"
        name: "content_type"
        widget: "hidden"
        default: ["boletin"]

      - label: "Programa"
        name: "programs"
        widget: "hidden"
        default: ["policy"]

      - label: "Tipo Hugo"
        name: "type"
        widget: "hidden"
        default: "posts"

      - label: "Destacado en home"
        name: "featured"
        widget: "boolean"
        default: false

      - label: "Imagen"
        name: "image"
        widget: "image"
        required: false
        choose_url: true

      - label: "Tags"
        name: "tags"
        widget: "list"
        required: false
        field:
          label: "Tag"
          name: "tag"
          widget: "string"

      - label: "Translation Key"
        name: "translationKey"
        widget: "string"
        required: false

      - label: "Cuerpo"
        name: "body"
        widget: "markdown"

  # ─────────────────────────────────────────
  # BOLETINES — OBSERVATORIO LEGISLATIVO (EN) — content/en/observatorio-legislativo
  # ─────────────────────────────────────────
  - name: "boletines_en"
    label: "Newsletters — Legislative Observatory (EN)"
    label_singular: "Newsletter"
    folder: "content/en/observatorio-legislativo"
    create: true
    format: "yaml-frontmatter"
    extension: "md"
    slug: "{{slug}}"
    fields: *boletines_fields


  # ─────────────────────────────────────────
  # AUTORES (ES)
  # ─────────────────────────────────────────
  - name: "autores_es"
    label: "Autores (ES)"
    label_singular: "Autor/a"
    folder: "content/es/autores"
    create: true
    format: "yaml-frontmatter"
    extension: "md"
    slug: "{{slug}}"
    identifier_field: "title"

    fields: &autores_fields
      - label: "Nombre completo"
        name: "title"
        widget: "string"

      - label: "Slug"
        name: "slug"
        widget: "string"
        hint: "nombre-apellido (sin acentos ni caracteres especiales)"
        pattern: ['^[a-z0-9-]+$', "Solo minúsculas, números y guiones"]

      - label: "Draft (borrador)"
        name: "draft"
        widget: "boolean"
        default: false

      - label: "Tipo de autor"
        name: "author_type"
        widget: "select"
        options:
          - { label: "Staff", value: "staff" }
          - { label: "Alumni", value: "alumni" }
          - { label: "Friends / Colaboradores", value: "friends" }

      - label: "Peso / Orden"
        name: "weight"
        widget: "number"
        value_type: "int"
        default: 99
        hint: "Número menor aparece primero dentro de su tipo"

      - label: "Rol / Cargo"
        name: "role"
        widget: "string"

      - label: "Organización"
        name: "organization"
        widget: "string"
        required: false

      - label: "Ubicación"
        name: "location"
        widget: "string"
        required: false
        hint: "Ej: Buenos Aires, AR"

      - label: "Foto"
        name: "photo"
        widget: "image"
        required: false
        choose_url: true

      - label: "Bio corta"
        name: "bio_short"
        widget: "string"
        hint: "Aparece junto al nombre en los posts"

      - label: "Twitter"
        name: "twitter_handle"
        widget: "string"
        required: false
        hint: "Usuario sin @"

      - label: "Bluesky"
        name: "bluesky_handle"
        widget: "string"
        required: false

      - label: "ORCID"
        name: "orcid_number"
        widget: "string"
        required: false

      - label: "Email"
        name: "email"
        widget: "object"
        required: false
        hint: "Se divide en usuario y dominio para evitar scrapers"
        fields:
          - label: "Usuario (antes del @)"
            name: "local"
            widget: "string"
            required: false
          - label: "Dominio (después del @)"
            name: "domain"
            widget: "string"
            required: false
          - label: "Mostrar ícono de email"
            name: "show_icon"
            widget: "boolean"
            default: true
          - label: "Email público"
            name: "public"
            widget: "boolean"
            default: false

      - label: "Translation Key"
        name: "translationKey"
        widget: "string"
        required: false

      - label: "Bio extensa"
        name: "body"
        widget: "markdown"
        required: false

  # ─────────────────────────────────────────
  # AUTORES (EN)
  # ─────────────────────────────────────────
  - name: "autores_en"
    label: "Autores (EN)"
    label_singular: "Author"
    folder: "content/en/autores"
    create: true
    format: "yaml-frontmatter"
    extension: "md"
    slug: "{{slug}}"
    identifier_field: "title"
    fields: *autores_fields
