name: Translate new ES posts to EN

on:
  push:
    branches: [main]
    paths:
      - "content/es/posts/**"                        # ES-post changes trigger this
      - "content/es/noticias-cruzando-el-mar/**"     # …and noticias changes
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: en-stub
  cancel-in-progress: false

jobs:
  stub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2              # need the previous commit for the diff

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install --upgrade deepl python-frontmatter

      - name: Translate new ES posts into EN
        env:
          BEFORE: ${{ github.event.before }}
          SHA: ${{ github.sha }}
          DEEPL_API_KEY: ${{ secrets.DEEPL_API_KEY }}
        run: python3 scripts/make_en_stubs.py

      - name: Commit & push any new translations
        run: |
          if [ -n "$(git status --porcelain content/en)" ]; then
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add content/en
            # No [skip ci]: let hugo.yml redeploy so the EN post goes live now.
            git commit -m "Auto: EN translation for new ES post(s)"
            # Survive concurrent pushes (CMS / flyers Action move main): rebase + retry.
            branch="${GITHUB_REF_NAME:-main}"
            pushed=""
            for attempt in 1 2 3 4 5; do
              if git pull --rebase --autostash origin "$branch" && git push origin "HEAD:$branch"; then
                echo "Pushed on attempt $attempt"; pushed=1; break
              fi
              echo "Push attempt $attempt failed (main moved); retrying…"
              sleep $(( (RANDOM % 4) + 2 ))
            done
            if [ -z "$pushed" ]; then echo "Failed to push EN translation after retries"; exit 1; fi
          else
            echo "No new EN translations."
          fi
