name: Create EN stub for new ES posts

on:
  push:
    branches: [main]
    paths:
      - "content/es/posts/**"        # only ES-post changes trigger this
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: en-stub
  cancel-in-progress: false

jobs:
  stub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2              # need the previous commit for the diff

      - name: Create EN stubs for new ES posts
        env:
          BEFORE: ${{ github.event.before }}
          SHA: ${{ github.sha }}
        run: python3 scripts/make_en_stubs.py

      - name: Commit & push any new stubs
        run: |
          if [ -n "$(git status --porcelain content/en/posts)" ]; then
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add content/en/posts
            git commit -m "Auto: EN stub for new ES post(s) [skip ci]"
            # Survive concurrent pushes (CMS / flyers Action move main): rebase + retry.
            branch="${GITHUB_REF_NAME:-main}"
            pushed=""
            for attempt in 1 2 3 4 5; do
              if git pull --rebase --autostash origin "$branch" && git push origin "HEAD:$branch"; then
                echo "Pushed on attempt $attempt"; pushed=1; break
              fi
              echo "Push attempt $attempt failed (main moved); retrying…"
              sleep $(( (RANDOM % 4) + 2 ))
            done
            if [ -z "$pushed" ]; then echo "Failed to push EN stub after retries"; exit 1; fi
          else
            echo "No new EN stubs."
          fi
