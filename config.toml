theme = "basic"
baseURL = "http://celedigital.github.io/"
defaultContentLanguage = "es"
defaultContentLanguageInSubdir = true

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
    [markup.goldmark.extensions.footnote]
      enable = true

# Email/newsletter output format. Opt in per page with
# `outputs = ["html", "email"]` to also emit <slug>/email.html.
[outputFormats.email]
  mediaType = "text/html"
  isHTML = true
  baseName = "email"
  notAlternative = true

[languages]
  [languages.es]
    languageName = "Español"
    languageCode = "es"
    contentDir = "content/es"
    weight = 1

    [languages.es.params]
      logo = "img/logo_cele.svg"
      mission = "Investigación, escritura y análisis sobre derecho, tecnología y gobernanza."

      [languages.es.params.mission_link]
        label = "Ver más"
        url = "/mision/"

    [languages.es.menu]
