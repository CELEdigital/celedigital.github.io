<script src="https://cdn.jsdelivr.net/npm/vega@5"></script>
<script src="https://cdn.jsdelivr.net/npm/vega-lite@5"></script>
<script src="https://cdn.jsdelivr.net/npm/vega-embed@6"></script>
<script>
  (function () {
    function emitDocumentationFilter(detail) {
      window.dispatchEvent(new CustomEvent('documentation:filter', { detail: detail }));
    }

    function getSyncKey(chartId) {
      return chartId.indexOf('chart-ia-') === 0 ? 'ia' : 'observatorio';
    }

    function normalize(value) {
      if (value === null || value === undefined || value === "") return "Sin dato";
      return String(value);
    }

    function buildSunburstInspector(view, chartId) {
      var host = document.getElementById(chartId);
      if (!host) return;
      var panel = host.closest(".vega-chart")?.querySelector("[data-sunburst-info]");
      if (!panel) return;

      function countBy(rows, field) {
        var map = new Map();
        rows.forEach(function (row) {
          var key = normalize(row[field]);
          map.set(key, (map.get(key) || 0) + 1);
        });
        return Array.from(map.entries()).sort(function (a, b) { return b[1] - a[1]; });
      }

      function renderPanel() {
        var rows = view.data("source") || [];
        var dataset = view.signal("selectedDataset");
        var country = view.signal("selectedCountry");
        var featureValue = view.signal("selectedFeature");
        var featureField = view.signal("featureField") || "objetivo";

        var filtered = rows.filter(function (row) {
          if (dataset && row.dataset !== dataset) return false;
          if (country && row.pais !== country) return false;
          if (featureValue && normalize(row[featureField]) !== featureValue) return false;
          return true;
        });

        var total = filtered.length;
        var minYear = null;
        var maxYear = null;
        filtered.forEach(function (row) {
          var y = Number(row.anio);
          if (!Number.isFinite(y)) return;
          if (minYear === null || y < minYear) minYear = y;
          if (maxYear === null || y > maxYear) maxYear = y;
        });

        var topFeature = countBy(filtered, featureField)[0];
        var topImpact = countBy(filtered, "impacto")[0];

        panel.innerHTML =
          '<h4 class="vega-info-panel__title">Detalle de selección</h4>' +
          '<ul class="vega-info-panel__stats">' +
          '<li><span class="vega-info-panel__label">Tipo:</span> ' + (dataset || "Todos") + '</li>' +
          '<li><span class="vega-info-panel__label">País:</span> ' + (country || "Todos") + '</li>' +
          '<li><span class="vega-info-panel__label">Capa:</span> ' + featureField + '</li>' +
          '<li><span class="vega-info-panel__label">Valor:</span> ' + (featureValue || "Todos") + '</li>' +
          '<li><span class="vega-info-panel__label">Registros:</span> ' + total.toLocaleString("es-AR") + '</li>' +
          '<li><span class="vega-info-panel__label">Rango temporal:</span> ' +
            (minYear === null ? "Sin dato" : minYear + " - " + maxYear) + '</li>' +
          '<li><span class="vega-info-panel__label">Impacto predominante:</span> ' +
            (topImpact ? topImpact[0] + " (" + topImpact[1] + ")" : "Sin dato") + '</li>' +
          '<li><span class="vega-info-panel__label">Top en capa:</span> ' +
            (topFeature ? topFeature[0] + " (" + topFeature[1] + ")" : "Sin dato") + '</li>' +
          '</ul>';

        emitDocumentationFilter({
          source: chartId,
          sync: getSyncKey(chartId),
          dataset: dataset || null,
          country: country || null,
          featureField: featureField || null,
          featureValue: featureValue || null
        });
      }

      ["selectedDataset", "selectedCountry", "selectedFeature", "featureField"].forEach(function (signalName) {
        try {
          view.addSignalListener(signalName, renderPanel);
        } catch (e) {
          console.warn("No signal listener for", signalName, e);
        }
      });
      renderPanel();
    }

    function readNivel1Selection(view) {
      var dataset = null;
      var country = null;

      try {
        var store = view.data("nivel1_store");
        if (Array.isArray(store) && store.length) {
          var entry = store[0] || {};
          if (Array.isArray(entry.values)) {
            dataset = entry.values[0] || null;
            country = entry.values[1] || null;
          } else {
            dataset = entry.dataset || null;
            country = entry.pais || null;
          }
        }
      } catch (err) {
        console.warn("Could not read nivel1_store", err);
      }

      if (!dataset || !country) {
        try {
          var signalSelection = view.signal("nivel1");
          if (signalSelection && typeof signalSelection === "object") {
            if (Array.isArray(signalSelection.values)) {
              dataset = dataset || signalSelection.values[0] || null;
              country = country || signalSelection.values[1] || null;
            }
            dataset = dataset || signalSelection.dataset || null;
            country = country || signalSelection.pais || null;
          }
        } catch (_) {
          // no-op
        }
      }

      return { dataset: dataset, country: country };
    }

    function readNivel2Selection(view) {
      var year = null;
      var featureValue = null;

      try {
        var store = view.data("nivel2_store");
        if (Array.isArray(store) && store.length) {
          var entry = store[0] || {};
          if (Array.isArray(entry.values)) {
            year = entry.values[0] || null;
            featureValue = entry.values[1] || null;
          } else {
            year = entry.anio || null;
            featureValue = entry.feature_clean || null;
          }
        }
      } catch (err) {
        console.warn("Could not read nivel2_store", err);
      }

      if (!year || !featureValue) {
        try {
          var signalSelection = view.signal("nivel2");
          if (signalSelection && typeof signalSelection === "object") {
            if (Array.isArray(signalSelection.values)) {
              year = year || signalSelection.values[0] || null;
              featureValue = featureValue || signalSelection.values[1] || null;
            }
            year = year || signalSelection.anio || null;
            featureValue = featureValue || signalSelection.feature_clean || null;
          }
        } catch (_) {
          // no-op
        }
      }

      return { year: year, featureValue: featureValue };
    }

    function buildObservatorioDbBridge(view, chartId) {
      function emit() {
        var level1 = readNivel1Selection(view);
        var level2 = readNivel2Selection(view);
        var featureField = null;
        try {
          featureField = view.signal("featureField") || null;
        } catch (_) {
          featureField = null;
        }

        emitDocumentationFilter({
          source: chartId,
          sync: getSyncKey(chartId),
          dataset: level1.dataset,
          country: level1.country,
          featureField: featureField,
          featureValue: level2.featureValue,
          year: level2.year
        });
      }

      try {
        view.addSignalListener("nivel1", emit);
      } catch (_) {
        // no-op
      }
      try {
        view.addSignalListener("featureField", emit);
      } catch (_) {
        // no-op
      }
      try {
        view.addDataListener("nivel1_store", emit);
      } catch (_) {
        // no-op
      }
      try {
        view.addSignalListener("nivel2", emit);
      } catch (_) {
        // no-op
      }
      try {
        view.addDataListener("nivel2_store", emit);
      } catch (_) {
        // no-op
      }
      emit();
    }

    function attachResizeObserver(view, hostId) {
      if (typeof ResizeObserver !== "function") return;
      var host = document.getElementById(hostId);
      if (!host) return;
      var timer = null;
      var ro = new ResizeObserver(function () {
        if (timer) clearTimeout(timer);
        timer = setTimeout(function () {
          try {
            view.resize();
            if (typeof view.runAsync === "function") view.runAsync();
            else view.run();
          } catch (e) {
            console.warn("Vega resize failed for", hostId, e);
          }
        }, 150);
      });
      ro.observe(host);
    }

    // Skip rendering charts on small screens — the CSS hides them anyway,
    // and Vega is heavyweight (~200KB + render cost). Saves bandwidth + CPU
    // on mobile. Re-checks on viewport changes (e.g. rotate to landscape on
    // a tablet) so charts appear without a reload.
    var SMALL_SCREEN_QUERY = window.matchMedia ? window.matchMedia('(max-width: 700px)') : null;
    var rendered = new Set();

    function renderAll() {
      if (!window.__vega_specs) return;
      if (SMALL_SCREEN_QUERY && SMALL_SCREEN_QUERY.matches) return;
      window.__vega_specs.forEach(function (item) {
        if (rendered.has(item.id)) return;
        rendered.add(item.id);
        vegaEmbed('#' + item.id, item.spec, { actions: false })
          .then(function (result) {
            attachResizeObserver(result.view, item.id);
            if (item.id === "chart-observatorio-sunburst" || item.id === "chart-ia-sunburst") {
              buildSunburstInspector(result.view, item.id);
            }
            if (item.id === "chart-observatorio-db" || item.id === "chart-ia-drilldown") {
              buildObservatorioDbBridge(result.view, item.id);
            }
          })
          .catch(function (err) {
            var host = document.getElementById(item.id);
            if (host) {
              host.innerHTML = '<p style="color:#b91c1c;font:600 0.95rem/1.4 Inter,Arial,sans-serif;">Vega error in ' +
                item.id + ': ' + (err && err.message ? err.message : err) + '</p>';
            }
            console.error('Vega embed failed for', item.id, err);
            rendered.delete(item.id);
          });
      });
    }

    renderAll();
    if (SMALL_SCREEN_QUERY && SMALL_SCREEN_QUERY.addEventListener) {
      SMALL_SCREEN_QUERY.addEventListener('change', renderAll);
    } else if (SMALL_SCREEN_QUERY && SMALL_SCREEN_QUERY.addListener) {
      // Safari < 14 fallback
      SMALL_SCREEN_QUERY.addListener(renderAll);
    }
  })();
</script>
