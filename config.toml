  [languages.en]
    languageName = "English"
    languageCode = "en"
    contentDir = "content/en"
    weight = 2

    # Folders are unified with ES (publicaciones, observatorio-legislativo) for
    # native CMS i18n; these permalinks keep the English-facing URLs.
    [languages.en.permalinks]
      publicaciones = "/research/:slug/"
      observatorio-legislativo = "/legislative-observatory/:slug/"
      temas = "/topics/:slug/"
      region = "/regions/:slug/"

