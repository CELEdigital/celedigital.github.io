backend:
  name: github
  repo: CELEdigital/celedigital.github.io
  branch: main
  site_domain: celedigital.netlify.app
  base_url: https://api.netlify.com
  auth_endpoint: auth

local_backend: true

media_folder: "static/img"
public_folder: "/img"

i18n:
  # Folders are unified across locales (content/es/<sec>/, content/en/<sec>/)
  # so every collection below pairs ES/EN by filename for side-by-side editing.
  # multiple_root_folders => content/<locale>/<folder>/<slug>.md
  # (replaces the now-deprecated multiple_folders_i18n_root).
  structure: multiple_root_folders
  locales: [es, en]
  default_locale: es

collections:

  # ─────────────────────────────────────────
  # POSTS (ES / EN)
  # ─────────────────────────────────────────
  - name: "posts"
    label: "Posts (ES / EN)"
    label_singular: "Post"
    # multiple_folders_i18n_root => content/<locale>/posts/<slug>.md
    folder: "content/posts"
    create: true
    format: "yaml-frontmatter"
    extension: "md"
    slug: "{{slug}}"
    i18n: true

    fields:
      - label: "Título"
        name: "title"
        widget: "string"
        i18n: true

      - label: "Slug"
        name: "slug"
        widget: "string"
        i18n: true
        hint: "URL del post: solo minúsculas, números y guiones (puede diferir por idioma)"
        pattern: ['^[a-z0-9-]+$', "Solo minúsculas, números y guiones"]

      - label: "Fecha"
        name: "date"
        widget: "datetime"
        date_format: "YYYY-MM-DD"
        time_format: false
        i18n: duplicate

      - label: "Descripción"
        name: "description"
        widget: "string"
        required: false
        i18n: true
        hint: "Resumen breve visible en listados y SEO"

      - label: "Autor/es"
        name: "author"
        widget: "list"
        i18n: duplicate
        hint: "Identificador del autor (ej: CELE, mmdg, adc). Uno por línea."
        field:
          label: "Autor"
          name: "author"
          widget: "string"

      - label: "Tipo de contenido"
        name: "content_type"
        widget: "select"
        multiple: true
        max: 1
        default: ["blog"]
        i18n: duplicate
        options:
          - { label: "Blog / Análisis", value: "blog" }
          - { label: "Mesa legislativa", value: "mesa" }
          - { label: "Boletín", value: "boletin" }

      - label: "Programa"
        name: "programs"
        widget: "select"
        multiple: true
        max: 1
        required: false
        default: ["policy"]
        i18n: duplicate
        options:
          - { label: "Policy", value: "policy" }
          - { label: "Publicaciones", value: "publicaciones" }

      - label: "Destacado en home"
        name: "featured"
        widget: "boolean"
        default: false
        i18n: duplicate

      - label: "Formatos de salida"
        name: "outputs"
        widget: "select"
        multiple: true
        required: false
        default: ["html"]
        i18n: duplicate
        hint: "Agregá 'Email / Newsletter' para generar la versión de email (.../email.html)"
        options:
          - { label: "Web (HTML)", value: "html" }
          - { label: "Email / Newsletter", value: "email" }

      - label: "Número de newsletter"
        name: "newsletter_number"
        widget: "string"
        required: false
        i18n: true
        hint: "Solo para email/newsletter. Ej: #9 · Enero 2025 (encabezado del email)"

      - label: "Bajada / tagline"
        name: "tagline"
        widget: "string"
        required: false
        i18n: true
        hint: "Solo para email/newsletter. Subtítulo del encabezado (si está vacío, usa la descripción)"

      - label: "Imagen"
        name: "image"
        widget: "image"
        required: false
        choose_url: true
        i18n: duplicate
        hint: "Imagen de portada (se guarda en /img)"

      - label: "Issues / Temas"
        name: "issues"
        widget: "select"
        multiple: true
        required: false
        i18n: duplicate
        options:
          - "Erosión democrática"
          - "Plataformas"
          - "Regulación y tecnología"
          - "Violencias"

      - label: "Región"
        name: "region"
        widget: "select"
        required: false
        i18n: duplicate
        options:
          - { label: "América Latina", value: "latam" }
          - { label: "Estados Unidos", value: "us" }
          - { label: "Europa", value: "europa" }
          - { label: "Global", value: "global" }

      - label: "Países"
        name: "country"
        widget: "list"
        required: false
        i18n: duplicate
        hint: "Códigos ISO de dos letras (ej: AR, BR, US, CO)"
        field:
          label: "País"
          name: "country"
          widget: "string"

      - label: "Placements (ubicaciones en hubs)"
        name: "placements"
        widget: "list"
        required: false
        i18n: duplicate
        hint: "Define en qué hub y en qué bloque aparece este post"
        fields:
          - label: "Hub"
            name: "hub"
            widget: "select"
            options:
              - { label: "Erosión democrática", value: "temas/erosion-democratica" }
              - { label: "Plataformas", value: "temas/plataformas" }
              - { label: "Regulación y tecnología", value: "temas/regulacion-y-tecnologia" }
              - { label: "Violencias", value: "temas/violencias" }
              - { label: "Región: América Latina", value: "region/america-latina" }
              - { label: "Región: Europa", value: "region/europa" }
              - { label: "Región: Global", value: "region/global" }
          - label: "Bloque"
            name: "block"
            widget: "select"
            default: "ultimas_noticias_analisis"
            options:
              - { label: "Destacado", value: "destacado" }
              - { label: "Últimas noticias y análisis", value: "ultimas_noticias_analisis" }
              - { label: "Publicaciones", value: "publicaciones" }

      - label: "Tags"
        name: "tags"
        widget: "list"
        required: false
        i18n: true
        field:
          label: "Tag"
          name: "tag"
          widget: "string"

      - label: "Translation Key"
        name: "translationKey"
        widget: "string"
        required: false
        i18n: duplicate
        hint: "Opcional con i18n nativo: ES/EN se vinculan por nombre de archivo. Úsalo solo si los archivos tienen nombres distintos."

      - label: "URL fuente"
        name: "source_url"
        widget: "string"
        required: false
        i18n: duplicate
        hint: "Solo para mesas: URL de la página original del evento"

      - label: "Tipo Hugo"
        name: "type"
        widget: "hidden"
        default: "posts"
        i18n: duplicate

      - label: "Cuerpo"
        name: "body"
        widget: "markdown"
        i18n: true


  # ─────────────────────────────────────────
  # PUBLICACIONES / PAPERS (ES / EN)
  # ES: content/es/publicaciones/  ·  EN: content/en/publicaciones/ (URL /en/research/)
  # ─────────────────────────────────────────
  - name: "publicaciones"
    label: "Publicaciones / Papers (ES / EN)"
    label_singular: "Publicación"
    folder: "content/publicaciones"
    create: true
    format: "yaml-frontmatter"
    extension: "md"
    slug: "{{slug}}"
    i18n: true

    fields:
      - label: "Título"
        name: "title"
        widget: "string"
        i18n: true

      - label: "Fecha"
        name: "date"
        widget: "datetime"
        date_format: "YYYY-MM-DD"
        time_format: false
        i18n: duplicate

      - label: "Autor/es"
        name: "author"
        widget: "list"
        i18n: duplicate
        field:
          label: "Autor"
          name: "author"
          widget: "string"

      - label: "Tipo de contenido"
        name: "content_type"
        widget: "select"
        multiple: true
        max: 1
        default: ["research"]
        i18n: duplicate
        options:
          - { label: "Documento de posición", value: "position-paper" }
          - { label: "Artículo de investigación", value: "research" }
          - { label: "Informe de jurisprudencia", value: "jurisprudencia" }
          - { label: "Informe legislativo", value: "informe-legislativo" }
          - { label: "Compilación", value: "compilation" }

      - label: "Programa"
        name: "programs"
        widget: "hidden"
        default: ["publicaciones"]
        i18n: duplicate

      - label: "SSRN ID"
        name: "ssrn_id"
        widget: "string"
        required: false
        i18n: duplicate
        hint: "Número de abstract en SSRN (ej: 5125874)"

      - label: "SSRN URL"
        name: "ssrn_url"
        widget: "string"
        required: false
        i18n: duplicate

      - label: "Referencia"
        name: "reference"
        widget: "string"
        required: false
        i18n: duplicate
        hint: "Ej: CELE Research Paper No. 11"

      - label: "Abstract"
        name: "abstract"
        widget: "text"
        required: false
        i18n: true

      - label: "Bibliografía (CSL-JSON)"
        name: "references"
        widget: "file"
        required: false
        media_folder: "/static/references"
        public_folder: "/references"
        i18n: duplicate
        hint: "Archivo JSON (CSL-JSON) con la bibliografía. Se guarda en /static/references/"

      - label: "Estilo de cita (CSL)"
        name: "csl"
        widget: "select"
        required: false
        i18n: duplicate
        hint: "Estilo de citación para la bibliografía"
        options:
          - { label: "OSCOLA", value: "/csl/oscola.csl" }

      - label: "Issues / Temas"
        name: "issues"
        widget: "select"
        multiple: true
        required: false
        i18n: duplicate
        options:
          - "Erosión democrática"
          - "Plataformas"
          - "Regulación y tecnología"
          - "Violencias"

      - label: "Región"
        name: "region"
        widget: "select"
        required: false
        i18n: duplicate
        options:
          - { label: "América Latina", value: "latam" }
          - { label: "Estados Unidos", value: "us" }
          - { label: "Europa", value: "europa" }
          - { label: "Global", value: "global" }

      - label: "Países"
        name: "country"
        widget: "list"
        required: false
        i18n: duplicate
        hint: "Códigos ISO de dos letras"
        field:
          label: "País"
          name: "country"
          widget: "string"

      - label: "Placements (ubicaciones en hubs)"
        name: "placements"
        widget: "list"
        required: false
        i18n: duplicate
        hint: "Define en qué hub y en qué bloque aparece esta publicación"
        fields:
          - label: "Hub"
            name: "hub"
            widget: "select"
            options:
              - { label: "Erosión democrática", value: "temas/erosion-democratica" }
              - { label: "Plataformas", value: "temas/plataformas" }
              - { label: "Regulación y tecnología", value: "temas/regulacion-y-tecnologia" }
              - { label: "Violencias", value: "temas/violencias" }
              - { label: "Región: América Latina", value: "region/america-latina" }
              - { label: "Región: Europa", value: "region/europa" }
              - { label: "Región: Global", value: "region/global" }
          - label: "Bloque"
            name: "block"
            widget: "select"
            options:
              - { label: "Destacado", value: "destacado" }
              - { label: "Últimas noticias y análisis", value: "ultimas_noticias_analisis" }
              - { label: "Publicaciones", value: "publicaciones" }

      - label: "Tags"
        name: "tags"
        widget: "list"
        required: false
        i18n: true
        field:
          label: "Tag"
          name: "tag"
          widget: "string"

      - label: "Translation Key"
        name: "translationKey"
        widget: "string"
        required: false
        i18n: duplicate
        hint: "Opcional con i18n nativo: ES/EN se vinculan por nombre de archivo."

      - label: "Cuerpo (opcional)"
        name: "body"
        widget: "markdown"
        required: false
        i18n: true


  # ─────────────────────────────────────────
  # BOLETINES — OBSERVATORIO LEGISLATIVO (ES / EN)
  # ES: content/es/observatorio-legislativo/  ·  EN: content/en/observatorio-legislativo/ (URL /en/legislative-observatory/)
  # ─────────────────────────────────────────
  - name: "boletines"
    label: "Boletines — Observatorio Legislativo (ES / EN)"
    label_singular: "Boletín"
    folder: "content/observatorio-legislativo"
    create: true
    format: "yaml-frontmatter"
    extension: "md"
    slug: "{{slug}}"
    i18n: true

    fields:
      - label: "Título"
        name: "title"
        widget: "string"
        i18n: true
        hint: "Ej: Boletín mensual Observatorio Legislativo | Junio 2024"

      - label: "Slug"
        name: "slug"
        widget: "string"
        i18n: true
        hint: "URL del boletín: solo minúsculas, números y guiones"
        pattern: ['^[a-z0-9-]+$', "Solo minúsculas, números y guiones"]

      - label: "Fecha"
        name: "date"
        widget: "datetime"
        date_format: "YYYY-MM-DD"
        time_format: false
        i18n: duplicate

      - label: "Descripción"
        name: "description"
        widget: "string"
        required: false
        i18n: true

      - label: "Autor/es"
        name: "author"
        widget: "list"
        i18n: duplicate
        field:
          label: "Autor"
          name: "author"
          widget: "string"

      - label: "Tipo de contenido"
        name: "content_type"
        widget: "hidden"
        default: ["boletin"]
        i18n: duplicate

      - label: "Programa"
        name: "programs"
        widget: "hidden"
        default: ["policy"]
        i18n: duplicate

      - label: "Tipo Hugo"
        name: "type"
        widget: "hidden"
        default: "posts"
        i18n: duplicate

      - label: "Destacado en home"
        name: "featured"
        widget: "boolean"
        default: false
        i18n: duplicate

      - label: "Imagen"
        name: "image"
        widget: "image"
        required: false
        choose_url: true
        i18n: duplicate

      - label: "Tags"
        name: "tags"
        widget: "list"
        required: false
        i18n: true
        field:
          label: "Tag"
          name: "tag"
          widget: "string"

      - label: "Translation Key"
        name: "translationKey"
        widget: "string"
        required: false
        i18n: duplicate

      - label: "Cuerpo"
        name: "body"
        widget: "markdown"
        i18n: true


  # ─────────────────────────────────────────
  # AUTORES / AUTHORS (ES / EN)
  # ─────────────────────────────────────────
  - name: "autores"
    label: "Autores (ES / EN)"
    label_singular: "Autor/a"
    folder: "content/autores"
    create: true
    format: "yaml-frontmatter"
    extension: "md"
    slug: "{{slug}}"
    identifier_field: "title"
    i18n: true

    fields:
      - label: "Nombre completo"
        name: "title"
        widget: "string"
        i18n: duplicate

      - label: "Slug"
        name: "slug"
        widget: "string"
        i18n: duplicate
        hint: "nombre-apellido (sin acentos ni caracteres especiales)"
        pattern: ['^[a-z0-9-]+$', "Solo minúsculas, números y guiones"]

      - label: "Draft (borrador)"
        name: "draft"
        widget: "boolean"
        default: false
        i18n: duplicate

      - label: "Tipo de autor"
        name: "author_type"
        widget: "select"
        i18n: duplicate
        options:
          - { label: "Staff", value: "staff" }
          - { label: "Alumni", value: "alumni" }
          - { label: "Friends / Colaboradores", value: "friends" }

      - label: "Peso / Orden"
        name: "weight"
        widget: "number"
        value_type: "int"
        default: 99
        i18n: duplicate
        hint: "Número menor aparece primero dentro de su tipo"

      - label: "Rol / Cargo"
        name: "role"
        widget: "string"
        i18n: true

      - label: "Organización"
        name: "organization"
        widget: "string"
        required: false
        i18n: duplicate

      - label: "Ubicación"
        name: "location"
        widget: "string"
        required: false
        i18n: duplicate
        hint: "Ej: Buenos Aires, AR"

      - label: "Foto"
        name: "photo"
        widget: "image"
        required: false
        choose_url: true
        i18n: duplicate

      - label: "Bio corta"
        name: "bio_short"
        widget: "string"
        i18n: true
        hint: "Aparece junto al nombre en los posts"

      - label: "Twitter"
        name: "twitter_handle"
        widget: "string"
        required: false
        i18n: duplicate
        hint: "Usuario sin @"

      - label: "Bluesky"
        name: "bluesky_handle"
        widget: "string"
        required: false
        i18n: duplicate

      - label: "ORCID"
        name: "orcid_number"
        widget: "string"
        required: false
        i18n: duplicate

      - label: "Email"
        name: "email"
        widget: "object"
        required: false
        i18n: duplicate
        hint: "Se divide en usuario y dominio para evitar scrapers"
        fields:
          - label: "Usuario (antes del @)"
            name: "local"
            widget: "string"
            required: false
          - label: "Dominio (después del @)"
            name: "domain"
            widget: "string"
            required: false
          - label: "Mostrar ícono de email"
            name: "show_icon"
            widget: "boolean"
            default: true
          - label: "Email público"
            name: "public"
            widget: "boolean"
            default: false

      - label: "Translation Key"
        name: "translationKey"
        widget: "string"
        required: false
        i18n: duplicate

      - label: "Bio extensa"
        name: "body"
        widget: "markdown"
        required: false
        i18n: true
